<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover">
<meta http-equiv="cleartype" content="on">
<title>Proof Report - demo</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

<div class="container mx-auto px-6 my-14 w-full max-w-5xl antialiased">
  <header>
    <div class="flex items-center space-x-4 mb-6">
      <h1 class="text-4xl leading-none font-medium">Proof report</h1>
      <span class="mt-2 rounded bg-neutral-100 px-2 py-1 font-mono text-sm leading-none">demo</span>
    </div>

    

    <div class="mt-6 md:flex md:items-center md:space-x-4 leading-none">
      <span class="block mb-2 md:inline md:m-0">July 15, 2026 &middot; 18:20:23 (1.3s)</span>
      <span class="whitespace-nowrap rounded font-medium text-green-800 bg-emerald-100/80 px-2 py-0.5 text-sm">1 Terminal</span>
    </div>

    <p class="my-6">Generated by <a href="https://www.npmjs.com/package/@automaze/proof" class="font-medium text-blue-600">@automaze/proof</a></p>
  </header>

  <main>
    
      <section class="mt-12 grid-cols-12 gap-x-6 border-t border-neutral-200 pt-12 md:grid">
        <div class="col-span-5">
          <h2 class="text-2xl mb-2">lifecycle</h2>
          <div class="flex items-center space-x-4 subpixel-antialiased">
            <span class="rounded text-green-800 bg-emerald-100/80 px-2 py-0.5 text-sm">Terminal</span>
            <time class="font-mono text-[13px]">18:20:24 (1.3s)</time>
          </div>
          <p class="opacity-80 my-4">Envapor full lifecycle: keygen, init, commit encrypts, checkout decrypts, readable diff, pre-commit guard, doctor</p>
        </div>
        <div class="col-span-7">
          <iframe class="w-full aspect-3/2 rounded-lg bg-black" allowtransparency="true" src="./lifecycle-182023.html"></iframe>
          
          <p class="font-medium text-sm mt-4 mb-1">Command:</p>
          <div class="font-mono text-xs border px-1 rounded bg-neutral-50 border-neutral-200 subpixel-antialiased w-fit">bash /tmp/envapor_demo.sh</div>
        </div>
      </section>
  </main>

  <footer></footer>
</div>

</body>
</html>
